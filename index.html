<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simeons.net</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif' font-weight='500'>s</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
      gap: 2rem;
    }

    .container {
      width: 100%;
      max-width: 460px;
      aspect-ratio: 1;
      border: 2px solid #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
      background-color: #fff;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(12, 1fr);
    }

    .box {
      transition: transform 0.3s ease, grid-column 0.5s ease, grid-row 0.5s ease, background-color 0.5s ease, opacity 0.5s ease;
      grid-column: span 3;
      grid-row: span 3;
      background-color: #d0d0d0;
      opacity: 0.5;
    }

    .box:hover {
      transform: scale(1.05);
      z-index: 1;
    }

    .box-1.revealed { grid-column: 1 / 4; grid-row: 1 / 5; }
    .box-2.revealed { grid-column: 4 / 9; grid-row: 1 / 4; }
    .box-3.revealed { grid-column: 9 / 13; grid-row: 1 / 6; }
    .box-4.revealed { grid-column: 4 / 6; grid-row: 4 / 7; }
    .box-5.revealed { grid-column: 6 / 9; grid-row: 4 / 8; }
    .box-6.revealed { grid-column: 1 / 5; grid-row: 5 / 7; }
    .box-7.revealed { grid-column: 9 / 13; grid-row: 6 / 10; }
    .box-8.revealed { grid-column: 1 / 4; grid-row: 7 / 10; }
    .box-9.revealed { grid-column: 4 / 9; grid-row: 8 / 10; }
    .box-10.revealed { grid-column: 1 / 5; grid-row: 10 / 13; }
    .box-11.revealed { grid-column: 5 / 9; grid-row: 10 / 13; }
    .box-12.revealed { grid-column: 9 / 13; grid-row: 10 / 13; }

    .site-name {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #1a1a1a;
    }

    .menu {
      display: flex;
      gap: 2rem;
    }

    .menu a {
      color: #666;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
      position: relative;
    }

    .menu a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: #1a1a1a;
      transition: width 0.2s ease;
    }

    .menu a:hover {
      color: #1a1a1a;
    }

    .menu a:hover::after {
      width: 100%;
    }

    @media (max-width: 640px) {
      body {
        padding: 1.5rem;
      }

      .container {
        max-width: 100%;
      }

      .menu {
        gap: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="box box-1"></div>
    <div class="box box-2"></div>
    <div class="box box-3"></div>
    <div class="box box-4"></div>
    <div class="box box-5"></div>
    <div class="box box-6"></div>
    <div class="box box-7"></div>
    <div class="box box-8"></div>
    <div class="box box-9"></div>
    <div class="box box-10"></div>
    <div class="box box-11"></div>
    <div class="box box-12"></div>
  </div>
  <h1 class="site-name">simeons.net</h1>
  <nav class="menu">
    <a href="https://linkedin.com/in/simeonwillbanks" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <a href="https://github.com/simeonwillbanks" target="_blank" rel="noopener noreferrer">GitHub</a>
    <a href="https://x.com/simeonwillbanks" target="_blank" rel="noopener noreferrer">X</a>
  </nav>

  <script>
    // Seeded random number generator (mulberry32)
    function mulberry32(seed) {
      return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }

    // Generate seed from UTC date string (changes daily)
    function getDateSeed() {
      const now = new Date();
      const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) {
        hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    // Base color palette - will be shuffled
    const basePalette = [
      '#E63946', '#457B9D', '#E9C46A', '#2A9D8F',
      '#264653', '#F4A261', '#A8DADC', '#1D3557',
      '#e07a5f', '#3d405b', '#81b29a', '#c17767'
    ];

    // Shuffle array using seeded random
    function shuffleArray(array, random) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Generate random opacity between 0.75 and 1.0
    function randomOpacity(random) {
      return 0.75 + (random() * 0.25);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const seed = getDateSeed();
      const random = mulberry32(seed);
      const colors = shuffleArray(basePalette, random);
      const boxes = document.querySelectorAll('.box');
      const delay = 150;

      boxes.forEach((box, index) => {
        const color = colors[index % colors.length];
        const opacity = randomOpacity(random);

        setTimeout(() => {
          box.classList.add('revealed');
          box.style.backgroundColor = color;
          box.style.opacity = opacity;
        }, delay * (index + 1));
      });
    });
  </script>
</body>

</html>
