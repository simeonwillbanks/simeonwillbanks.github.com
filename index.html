<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simeons.net</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif' font-weight='500'>s</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
      gap: 2rem;
    }

    .container {
      width: 100%;
      max-width: 460px;
      aspect-ratio: 1;
      border: 2px solid #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
      background-color: #fff;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(12, 1fr);
    }

    .box {
      transition: transform 0.3s ease, grid-column 0.6s ease, grid-row 0.6s ease, background-color 0.6s ease, opacity 0.6s ease;
      background-color: #d0d0d0;
      opacity: 0.5;
    }

    .box:hover {
      transform: scale(1.05);
      z-index: 1;
    }

    .site-name {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #1a1a1a;
    }

    .menu {
      display: flex;
      gap: 2rem;
    }

    .menu a {
      color: #666;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
      position: relative;
    }

    .menu a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: #1a1a1a;
      transition: width 0.2s ease;
    }

    .menu a:hover {
      color: #1a1a1a;
    }

    .menu a:hover::after {
      width: 100%;
    }

    @media (max-width: 640px) {
      body {
        padding: 1.5rem;
      }

      .container {
        max-width: 100%;
      }

      .menu {
        gap: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="container" id="container"></div>
  <h1 class="site-name">simeons.net</h1>
  <nav class="menu">
    <a href="https://linkedin.com/in/simeonwillbanks" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <a href="https://github.com/simeonwillbanks" target="_blank" rel="noopener noreferrer">GitHub</a>
    <a href="https://x.com/simeonwillbanks" target="_blank" rel="noopener noreferrer">X</a>
  </nav>

  <script>
    // Seeded random number generator (mulberry32)
    function mulberry32(seed) {
      return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }

    // Generate seed from UTC date string (changes daily)
    function getDateSeed() {
      const now = new Date();
      const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) {
        hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    // Base color palette
    const basePalette = [
      '#E63946', '#457B9D', '#E9C46A', '#2A9D8F',
      '#264653', '#F4A261', '#A8DADC', '#1D3557',
      '#e07a5f', '#3d405b', '#81b29a', '#c17767'
    ];

    // Convert hex to HSL
    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1, 3), 16) / 255;
      let g = parseInt(hex.slice(3, 5), 16) / 255;
      let b = parseInt(hex.slice(5, 7), 16) / 255;

      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    // Get lightness offset based on current minute (-20 to +20)
    function getMinuteLightnessOffset() {
      const minute = new Date().getMinutes();
      // Map 0-59 to -20 to +20 (oscillates: darker at 0, lighter at 30, darker at 59)
      return Math.sin((minute / 60) * Math.PI * 2) * 20;
    }

    // Apply lightness offset to a hex color
    function adjustColorLightness(hex, offset) {
      const hsl = hexToHSL(hex);
      const newL = Math.max(10, Math.min(90, hsl.l + offset));
      return `hsl(${hsl.h}, ${hsl.s}%, ${newL}%)`;
    }

    // Shuffle array using seeded random
    function shuffleArray(array, random) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Generate random grid layout that fills 12x12 grid
    function generateGridLayout(random) {
      const gridSize = 12;
      const grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(false));
      const boxes = [];
      const minSize = 2;
      const maxSize = 5;

      function canPlace(startRow, startCol, height, width) {
        if (startRow + height > gridSize || startCol + width > gridSize) return false;
        for (let r = startRow; r < startRow + height; r++) {
          for (let c = startCol; c < startCol + width; c++) {
            if (grid[r][c]) return false;
          }
        }
        return true;
      }

      function place(startRow, startCol, height, width) {
        for (let r = startRow; r < startRow + height; r++) {
          for (let c = startCol; c < startCol + width; c++) {
            grid[r][c] = true;
          }
        }
        boxes.push({
          colStart: startCol + 1,
          colEnd: startCol + width + 1,
          rowStart: startRow + 1,
          rowEnd: startRow + height + 1
        });
      }

      // Fill the grid
      for (let row = 0; row < gridSize; row++) {
        for (let col = 0; col < gridSize; col++) {
          if (grid[row][col]) continue;

          // Try random sizes, prefer larger
          const sizes = [];
          for (let h = maxSize; h >= minSize; h--) {
            for (let w = maxSize; w >= minSize; w--) {
              if (canPlace(row, col, h, w)) {
                sizes.push({ h, w });
              }
            }
          }

          if (sizes.length > 0) {
            // Pick a random size from available options, weighted toward larger
            const idx = Math.floor(random() * Math.min(sizes.length, 4));
            const { h, w } = sizes[idx];
            place(row, col, h, w);
          } else {
            // Fill remaining small cells
            let h = 1, w = 1;
            while (row + h < gridSize && !grid[row + h][col]) h++;
            while (col + w < gridSize && canPlace(row, col, h, w + 1)) w++;
            if (canPlace(row, col, h, w)) {
              place(row, col, h, w);
            }
          }
        }
      }

      return boxes;
    }

    // Generate random opacity between 0.75 and 1.0
    function randomOpacity(random) {
      return 0.75 + (random() * 0.25);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const seed = getDateSeed();
      const random = mulberry32(seed);
      const colors = shuffleArray(basePalette, random);
      const layout = generateGridLayout(random);
      const container = document.getElementById('container');
      const delay = 150;

      // Create initial uniform boxes (4x4 grid of 3x3 boxes)
      const initialBoxes = [];
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 4; col++) {
          const box = document.createElement('div');
          box.className = 'box';
          box.style.gridColumn = `${col * 3 + 1} / ${col * 3 + 4}`;
          box.style.gridRow = `${row * 3 + 1} / ${row * 3 + 4}`;
          container.appendChild(box);
          initialBoxes.push(box);
        }
      }

      // Remove extra initial boxes if layout has fewer, or add if more
      while (initialBoxes.length > layout.length) {
        const removed = initialBoxes.pop();
        removed.remove();
      }
      while (initialBoxes.length < layout.length) {
        const box = document.createElement('div');
        box.className = 'box';
        box.style.gridColumn = '1 / 4';
        box.style.gridRow = '1 / 4';
        box.style.opacity = '0';
        container.appendChild(box);
        initialBoxes.push(box);
      }

      // Get current minute-based lightness offset
      const lightnessOffset = getMinuteLightnessOffset();

      // Animate to final layout
      initialBoxes.forEach((box, index) => {
        const target = layout[index];
        const baseColor = colors[index % colors.length];
        const color = adjustColorLightness(baseColor, lightnessOffset);
        const opacity = randomOpacity(random);

        setTimeout(() => {
          box.style.gridColumn = `${target.colStart} / ${target.colEnd}`;
          box.style.gridRow = `${target.rowStart} / ${target.rowEnd}`;
          box.style.backgroundColor = color;
          box.style.opacity = opacity;
        }, delay * (index + 1));
      });
    });
  </script>
</body>

</html>
